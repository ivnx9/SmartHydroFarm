<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>404 • SmartHydroFarm</title>
<style>
  body {
    margin:0; height:100vh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#0b0f0d,#0f3d2e);
    font-family: system-ui, Arial, sans-serif; color:#e8f3ee;
  }
  .box {
    text-align:center; max-width:480px; padding:40px;
    background:#111714cc; border-radius:20px; box-shadow:0 8px 24px rgba(0,0,0,.35);
  }
  .logo {
    width:60px;height:60px;margin:0 auto 20px;border-radius:16px;
    background:conic-gradient(from 200deg at 50% 40%, #1a3b2d, #26c281 40%, #0f9a61);
  }
  h1 { font-size:64px; margin:0; color:#26c281 }
  h2 { margin:10px 0 20px; font-weight:400 }
  p { color:#c5d2cb; margin-bottom:28px }
  a.button {
    display:inline-block; padding:12px 22px; border-radius:12px;
    background:linear-gradient(180deg,#26c281,#15925f); color:#fff; text-decoration:none;
    font-weight:500; transition:.2s;
  }
  a.button:hover { filter:brightness(1.1) }
</style>
</head>
<body>
  <div class="box">
    <div class="logo"></div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you’re looking for doesn’t exist or has been moved.</p>
    <a href="/" class="button">Go Back Home</a>
  </div>
</body>
</html>
